<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pesquisa de Peças — Mercado Livre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0f; color: #e8e4dc; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 28px 24px; }

  .header { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 28px; border-bottom: 1px solid #2a2a2e; padding-bottom: 18px; }
  .logo-box { background: #f5c518; color: #0d0d0f; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.08em; padding: 5px 9px; border-radius: 4px; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #e8e4dc; }
  .header-sub { font-size: 11px; color: #555; margin-left: auto; font-family: 'DM Mono', monospace; }

  .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 700px) { .search-grid { grid-template-columns: 1fr; } }

  .search-box { background: #18181c; border: 1px solid #2e2e34; border-radius: 10px; padding: 16px; }
  .search-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #f5c518; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .search-input { width: 100%; background: #0d0d0f; border: 1px solid #2e2e34; border-radius: 6px; color: #e8e4dc; font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: #f5c518; }
  .search-input::placeholder { color: #3a3a42; }

  .btn-search { width: 100%; background: #f5c518; color: #0d0d0f; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; padding: 14px; cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s; margin-bottom: 28px; }
  .btn-search:hover { background: #ffd740; }
  .btn-search:active { transform: scale(0.99); }
  .btn-search:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }

  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .results-grid { grid-template-columns: 1fr; } }

  .result-section { background: #18181c; border: 1px solid #2e2e34; border-radius: 10px; overflow: hidden; display: none; }
  .result-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #2e2e34; background: #1e1e24; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #f5c518; }
  .result-badge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: #555; background: #0d0d0f; border: 1px solid #2e2e34; border-radius: 4px; padding: 2px 8px; }
  .result-badge.green { border-color: #3a8c4a; color: #6ecf80; }
  .result-badge.yellow { border-color: #8c7a1a; color: #f5c518; }

  .step { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: #555; }
  .step.running { color: #f5c518; }
  .step.error { color: #ff8080; }
  .spinner { width: 13px; height: 13px; border: 2px solid #2e2e34; border-top-color: #f5c518; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ads-table { width: 100%; border-collapse: collapse; }
  .ads-table th { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #444; padding: 8px 12px; border-bottom: 1px solid #2e2e34; text-align: left; }
  .ads-table td { padding: 9px 12px; border-bottom: 1px solid #1c1c22; font-size: 12px; color: #ccc; vertical-align: middle; }
  .ads-table tr:last-child td { border-bottom: none; }
  .ads-table tr:hover td { background: #1e1e26; }
  .price { font-family: 'DM Mono', monospace; color: #f5c518; font-weight: 500; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-family: 'DM Mono', monospace; }
  .badge.novo { background: #1a3a22; color: #6ecf80; border: 1px solid #2a5a32; }
  .badge.usado { background: #3a2a10; color: #e0a040; border: 1px solid #5a4a20; }
  .ad-title { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
  .ad-link { color: #b0c4ff; text-decoration: none; font-size: 11px; }
  .ad-link:hover { color: #f5c518; }
  .no-results { padding: 24px 16px; text-align: center; color: #444; font-size: 13px; font-style: italic; }

  .summary-bar { display: none; background: #18181c; border: 1px solid #2e2e34; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #666; font-family: 'DM Mono', monospace; }
  .summary-bar span { color: #f5c518; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">ML</div>
  <div class="header-title">Pesquisa de Peças</div>
  <div class="header-sub">Sucatão do Major · v3.0</div>
</div>

<div class="search-grid">
  <div class="search-box">
    <div class="search-label">🔢 Part Number</div>
    <input class="search-input" id="inputPN" type="text" placeholder="Ex: 33510K1ZJ100" autocomplete="off" spellcheck="false" />
  </div>
  <div class="search-box">
    <div class="search-label">📝 Descrição do Produto</div>
    <input class="search-input" id="inputDesc" type="text" placeholder="Ex: Pisca traseiro Honda CBR 500R original" autocomplete="off" />
  </div>
</div>

<button class="btn-search" id="btnSearch" onclick="runSearch()">🔍 Pesquisar no Mercado Livre</button>

<div class="summary-bar" id="summaryBar">Pesquisando: <span id="summaryText"></span></div>

<div class="results-grid">
  <!-- Part Number Results -->
  <div class="result-section" id="sectionPN">
    <div class="result-header">
      <span>🔢</span>
      <span class="result-title" id="titlePN">Part Number</span>
      <span class="result-badge" id="badgePN">—</span>
    </div>
    <div id="bodyPN">
      <div class="step running"><div class="spinner"></div> Buscando...</div>
    </div>
  </div>

  <!-- Descrição Results -->
  <div class="result-section" id="sectionDesc">
    <div class="result-header">
      <span>📝</span>
      <span class="result-title" id="titleDesc">Descrição</span>
      <span class="result-badge" id="badgeDesc">—</span>
    </div>
    <div id="bodyDesc">
      <div class="step running"><div class="spinner"></div> Buscando...</div>
    </div>
  </div>
</div>

<script>
var ML_URL = "/api/ml";

async function searchML(query) {
  var res = await fetch(ML_URL + "?q=" + encodeURIComponent(query) + "&limit=10&site_id=MLB");
  if (!res.ok) throw new Error("Erro ML API: " + res.status);
  var data = await res.json();
  return data.results || [];
}

function renderTable(results) {
  if (!results || results.length === 0) {
    return '<div class="no-results">Nenhum anúncio encontrado.</div>';
  }
  var rows = results.map(function(a, i) {
    var cond = a.condition === "new" ? "novo" : "usado";
    var preco = Number(a.price).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
    var titulo = (a.title || "—");
    var link = a.permalink || "#";
    var seller = a.seller && a.seller.nickname ? a.seller.nickname : "—";
    return "<tr>" +
      "<td style='color:#444;font-family:monospace;font-size:10px'>" + String(i+1).padStart(2,"0") + "</td>" +
      "<td><div class='ad-title' title='" + titulo.replace(/'/g,"") + "'>" + titulo + "</div></td>" +
      "<td class='price'>R$ " + preco + "</td>" +
      "<td><span class='badge " + cond + "'>" + cond + "</span></td>" +
      "<td style='font-size:10px;color:#666;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>" + seller + "</td>" +
      "<td><a class='ad-link' href='" + link + "' target='_blank' rel='noopener'>Ver ↗</a></td>" +
      "</tr>";
  }).join("");
  return "<div style='overflow-x:auto'><table class='ads-table'>" +
    "<thead><tr><th>#</th><th>Título</th><th>Preço</th><th>Cond.</th><th>Vendedor</th><th>Link</th></tr></thead>" +
    "<tbody>" + rows + "</tbody></table></div>";
}

async function runSearch() {
  var pn = document.getElementById("inputPN").value.trim();
  var desc = document.getElementById("inputDesc").value.trim();

  if (!pn && !desc) {
    alert("Informe o Part Number ou a Descrição para pesquisar.");
    return;
  }

  document.getElementById("btnSearch").disabled = true;
  document.getElementById("summaryBar").style.display = "block";
  document.getElementById("summaryText").textContent = [pn, desc].filter(Boolean).join(" + ");

  // Show/hide sections
  var sPN = document.getElementById("sectionPN");
  var sDesc = document.getElementById("sectionDesc");

  if (pn) {
    sPN.style.display = "block";
    document.getElementById("titlePN").textContent = pn;
    document.getElementById("badgePN").textContent = "buscando...";
    document.getElementById("badgePN").className = "result-badge";
    document.getElementById("bodyPN").innerHTML = "<div class='step running'><div class='spinner'></div> Buscando no Mercado Livre...</div>";
  } else {
    sPN.style.display = "none";
  }

  if (desc) {
    sDesc.style.display = "block";
    document.getElementById("titleDesc").textContent = desc.length > 30 ? desc.substring(0,30)+"..." : desc;
    document.getElementById("badgeDesc").textContent = "buscando...";
    document.getElementById("badgeDesc").className = "result-badge";
    document.getElementById("bodyDesc").innerHTML = "<div class='step running'><div class='spinner'></div> Buscando no Mercado Livre...</div>";
  } else {
    sDesc.style.display = "none";
  }

  // Run searches in parallel
  var promises = [];

  if (pn) {
    promises.push(
      searchML(pn)
        .then(function(results) {
          var count = results.length;
          document.getElementById("badgePN").textContent = count + " resultado(s)";
          document.getElementById("badgePN").className = "result-badge " + (count > 0 ? "green" : "");
          document.getElementById("bodyPN").innerHTML = renderTable(results);
        })
        .catch(function(e) {
          document.getElementById("badgePN").textContent = "erro";
          document.getElementById("bodyPN").innerHTML = "<div class='step error'>❌ " + e.message + "</div>";
        })
    );
  }

  if (desc) {
    promises.push(
      searchML(desc)
        .then(function(results) {
          var count = results.length;
          document.getElementById("badgeDesc").textContent = count + " resultado(s)";
          document.getElementById("badgeDesc").className = "result-badge " + (count > 0 ? "green" : "");
          document.getElementById("bodyDesc").innerHTML = renderTable(results);
        })
        .catch(function(e) {
          document.getElementById("badgeDesc").textContent = "erro";
          document.getElementById("bodyDesc").innerHTML = "<div class='step error'>❌ " + e.message + "</div>";
        })
    );
  }

  await Promise.all(promises);
  document.getElementById("btnSearch").disabled = false;
}

// Enter key support
["inputPN","inputDesc"].forEach(function(id) {
  document.getElementById(id).addEventListener("keydown", function(e) {
    if (e.key === "Enter") runSearch();
  });
});
</script>
</body>
</html>
